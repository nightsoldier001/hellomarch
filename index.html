<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>hellomarch - File Viewer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #000000;
}

header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #000;
    font-size: 22px;
}

.container {
    display: flex;
    height: calc(100vh - 70px);
}

.sidebar {
    width: 300px;
    border-right: 1px solid #000;
    overflow-y: auto;
    background: #f8f8f8;
}

.file {
    padding: 12px;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
}

.file:hover {
    background: #000;
    color: #fff;
}

.viewer {
    flex: 1;
    background: #ffffff;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>

<body>

<header>HELLOMARCH FILE VIEWER</header>

<div class="container">

<div class="sidebar">

<div class="file" onclick="openPDF('2025.Q4-HFR-GIR_FINAL.pdf')">2025.Q4-HFR-GIR_FINAL</div>
<div class="file" onclick="openPDF('Core Satellite Clones comments-1.pdf')">Core Satellite Clones</div>
<div class="file" onclick="openPDF('HF_Fung & Hsieh (1999).pdf')">HF Fung & Hsieh</div>

<div class="file" onclick="openPDF('Hedge Fund Exam_Sample Question & Answer.pdf')">HF Sample Q&A 1</div>
<div class="file" onclick="openPDF('Hedge Fund Exam_Sample Question & Answer_2.pdf')">HF Sample Q&A 2</div>

<!-- DOCX FILES (FIXED) -->
<div class="file" onclick="openDOCX('Hedge Fund_Final Exam Review.docx')">HF Review 1</div>
<div class="file" onclick="openDOCX('Hedge Fund_Final Exam Review_2.docx')">HF Review 2</div>
<div class="file" onclick="openDOCX('Hedge Fund_Final Exam Review_3.docx')">HF Review 3</div>

<div class="file" onclick="openPDF('LIM-IndirectIncentivesHedge-2016.pdf')">LIM 2016</div>
<div class="file" onclick="openPDF('Summary_Naik_Lecture_V2.pdf')">Naik Summary</div>
<div class="file" onclick="openPDF('YIN-OptimalSizeHedge-2016.pdf')">YIN 2016</div>

</div>

<div class="viewer" id="viewer">
    <p style="padding:20px;">Click a file to preview</p>
</div>

</div>

<script>

// PDF VIEWER
function openPDF(file) {
    document.getElementById("viewer").innerHTML =
        `<iframe src="${file}#toolbar=0"></iframe>`;
}

// DOCX VIEWER (KEY FIX)
function openDOCX(file) {
    const url = window.location.origin + window.location.pathname + file;

    document.getElementById("viewer").innerHTML =
        `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}"></iframe>`;
}

</script>

</body>
</html>
